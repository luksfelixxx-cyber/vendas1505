@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#0a0b0e;--s1:#111318;--s2:#181c22;--s3:#1f242d;--border:#23282f;--border2:#2c3340;--accent:#4f8ef7;--aglow:rgba(79,142,247,.12);--green:#10b981;--yellow:#f59e0b;--red:#f43f5e;--text:#e8edf3;--muted:#5a6478;--muted2:#8492a6;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.logo{font-size:13px;font-weight:800;color:var(--accent);letter-spacing:.3px;cursor:pointer}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-left:16px}
.bc-sep{color:var(--border2)}.bc-item{cursor:pointer;transition:color .15s}.bc-item:hover{color:var(--text)}.bc-item.cur{color:var(--text);font-weight:600}
.topbar-r{display:flex;align-items:center;gap:10px}
.upd-info{font-size:11px;color:var(--muted);text-align:right;line-height:1.4}
.up-btn{background:var(--s2);border:1px solid var(--border2);color:var(--muted2);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.up-btn:hover{border-color:var(--accent);color:var(--accent)}
#fi{display:none}
.view{display:none;padding:20px;max-width:1080px;margin:0 auto;padding-bottom:60px}.view.on{display:block}
.hero{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:22px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,142,247,.05) 0%,transparent 60%);pointer-events:none}
.hero-eye{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.hero-num{font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;line-height:1}
.hero-sub{font-size:12px;color:var(--muted2);margin-bottom:16px}
.bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px}
.hero-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:18px}
.hk{background:rgba(0,0,0,.35);border-radius:7px;padding:11px 13px}
.hk-val{font-size:18px;font-weight:800;line-height:1}
.hk-lbl{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;margin-top:2px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:border-color .18s,transform .12s}
.sc:hover{border-color:var(--accent);transform:translateY(-1px)}
.sc-num{font-size:30px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:2px}
.sc-sub{font-size:10px;color:var(--muted);margin-bottom:12px;font-weight:500}
.sc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:4px}
.sc-row-lbl{color:var(--muted2)}
.sc-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:9px 0 7px}
.sc-bar-fill{height:100%;border-radius:2px}
.sc-foot{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.sc-metadia{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);border-radius:6px;padding:6px 10px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
.sc-metadia-lbl{font-size:10px;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sc-metadia-val{font-size:14px;font-weight:900;color:var(--red)}
.pg-title{font-size:24px;font-weight:900;margin-bottom:3px;letter-spacing:-.5px}
.pg-sub{font-size:12px;color:var(--muted2);margin-bottom:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.kpi-val{font-size:19px;font-weight:800;line-height:1}
.kpi-lbl{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;font-weight:500}
.kpi-hl{background:linear-gradient(135deg,rgba(244,63,94,.14),rgba(244,63,94,.04));border-color:rgba(244,63,94,.3)!important}
.kpi-hl .kpi-val{font-size:26px;color:var(--red)}
.kpi-hl .kpi-lbl{color:rgba(244,63,94,.65)}
.tabs{display:flex;gap:2px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:7px 8px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.tab.on{background:var(--s1);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.list-tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-tb-title{font-size:13px;font-weight:700}
.bdg{background:var(--s3);border:1px solid var(--border);padding:2px 10px;border-radius:99px;font-size:11px;color:var(--muted2);font-weight:500}
.sort-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.sort-lbl{font-size:11px;color:var(--muted);font-weight:500}
.sb{background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500}
.sb:hover,.sb.on{border-color:var(--accent);color:var(--accent);background:var(--aglow)}
.search-wrap{position:relative;margin-bottom:10px}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.srch{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:9px 12px 9px 32px;border-radius:8px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.srch:focus{border-color:var(--accent)}.srch::placeholder{color:var(--muted)}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb{background:var(--s2);border:1px solid var(--border);color:var(--muted2);padding:5px 13px;border-radius:99px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.fb:hover,.fb.on{border-color:var(--accent);color:var(--accent);background:var(--aglow)}
.cl{display:flex;flex-direction:column;gap:4px}
.ci{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:12px}
.ci:hover{border-color:var(--accent)}
.ci-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-seg{font-size:11px;color:var(--muted);margin-top:1px}
.ci-r{text-align:right;flex-shrink:0}
.ci-val{font-size:14px;font-weight:700}
.ci-meta{font-size:10px;color:var(--muted)}
.ci-pct{font-size:10px;font-weight:700;margin-top:1px}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px}
.cd-name{font-size:20px;font-weight:800;margin-bottom:3px;line-height:1.2;letter-spacing:-.3px}
.cd-sub{font-size:12px;color:var(--muted2);margin-bottom:10px}
.cd-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tag{background:var(--s2);border:1px solid var(--border);padding:3px 10px;border-radius:99px;font-size:11px;color:var(--muted2);font-weight:500}
.prog-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:10px}

.s-warn{background:rgba(245,158,11,.12);color:var(--yellow)}

.m5k-card{border-radius:10px;padding:16px 20px;margin-bottom:10px;border:1px solid}

.info-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}

.ir-l{color:var(--muted2)}.ir-r{font-weight:600;text-align:right}
.div{height:1px;background:var(--border);margin:16px 0}

.toast.show{opacity:1}

</head>

function stats(arr){
  const vr=arr.reduce((s,c)=>s+Math.max(0,c.vb_real),0);
  const vp=arr.reduce((s,c)=>s+Math.max(0,c.vb_proj),0);
  const sem=arr.filter(c=>c.vb_real<=0).length;
  const sub=arr.filter(c=>c.vb_real>0&&c.vb_real<5000).length;
  const ok=arr.filter(c=>c.acima_5k===1).length;
  const m5=arr.filter(c=>c.vb_proj>=5000).length;
  const batendo=arr.filter(c=>c.vb_proj>0&&c.vb_real>=c.vb_proj).length;
  const comMeta=arr.filter(c=>c.vb_proj>0).length;
  const falta=Math.max(0,vp-vr);
  const dia=DIAS_REST>0?falta/DIAS_REST:0;
  const p=pct(vr,vp);
  const pBat=comMeta>0?Math.round((batendo/comMeta)*100):0;
  return{vr,vp,sem,sub,ok,m5,batendo,comMeta,falta,dia,p,pBat,total:arr.length};
}

      let hRow=-1;
      for(let i=0;i<Math.min(5,rows.length);i++){
        if(String(rows[i][6]||'').toLowerCase().includes('setor')){hRow=i;break;}
      }
      if(hRow===-1){showToast('❌ Coluna Setor não encontrada');return;}
      
      const sf=v=>{const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?0:Math.round(n*100)/100};
      const ai=v=>{const n=parseInt(v);return isNaN(n)?0:n};
      
      const newData=[];
      for(let i=hRow+2;i<rows.length;i++){
        const row=rows[i];
        const setor=String(row[6]||'').trim();
        if(!setor||setor.includes('3495'))continue;
        newData.push({
          setor,razao:String(row[4]||'').trim(),bandeira:String(row[1]||'').trim(),
          segmento:String(row[5]||'').trim(),cod:String(row[2]||'').trim(),
          vb_real:sf(row[12]),vb_proj:sf(row[13]),potencial:sf(row[11]),acima_5k:ai(row[29])
        });
      }
      
      if(newData.length<10){showToast('❌ Poucos dados encontrados — verifique o arquivo');return;}
      
      DATA=newData;
      buildSetores();
      const now=new Date();
      document.getElementById('updInfo').textContent='Atualizado '+now.toLocaleDateString('pt-BR')+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      curSetor=null;
      showView('vOv');
      renderOverview();
      showToast('✓ '+DATA.length+' clientes carregados');
    }catch(err){showToast('❌ Erro: '+err.message);}
  };
  r.readAsArrayBuffer(f);
  e.target.value='';
}

// ── NAVIGATION ────────────────────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
  renderBc(id);
}
function renderBc(id){
  const bc=document.getElementById('bc');
  if(id==='vOv'){bc.innerHTML='';return;}
  const n=curSetor?num(curSetor):'';
  if(id==='vSt')bc.innerHTML=`<span class="bc-sep">›</span><span class="bc-item cur">Setor ${n}</span>`;
  else bc.innerHTML=`<span class="bc-sep">›</span><span class="bc-item" onclick="navSetor()">Setor ${n}</span><span class="bc-sep">›</span><span class="bc-item cur">Cliente</span>`;
}
document.getElementById('logoBtn').onclick=()=>showView('vOv');
function navSetor(){openSetor(curSetor);}

// ── OVERVIEW ──────────────────────────────────────────────
function renderOverview(){
  const s=stats(DATA);const p=s.p;
  document.getElementById('rMes').textContent=MES;
  document.getElementById('rNum').innerHTML=`<span style="color:${clr(p)}">${fk(s.vr)}</span><span style="color:var(--muted2);font-size:15px;font-weight:500"> de ${fk(s.vp)}</span>`;
  document.getElementById('rSub').textContent=`${s.pBat}% dos clientes batendo meta · ${s.ok} acima de R$5k`;
  document.getElementById('rBar').style.cssText=`width:${Math.min(p,100)}%;background:${clr(p)}`;
  document.getElementById('rPct').innerHTML=`<span style="color:${clr(p)};font-weight:700">${p}% da meta</span>`;
  document.getElementById('rDias').textContent=`${DIAS_REST} dias restantes`;
  document.getElementById('rKpis').innerHTML=`
    <div class="hk"><div class="hk-val" style="color:${clr(p)}">${p}%</div><div class="hk-lbl">meta geral</div></div>
    <div class="hk"><div class="hk-val" style="color:var(--green)">${s.pBat}%</div><div class="hk-lbl">clientes batendo meta</div></div>
    <div class="hk"><div class="hk-val" style="color:var(--yellow)">${s.sub}</div><div class="hk-lbl">abaixo R$5k</div></div>
    <div class="hk"><div class="hk-val" style="color:var(--green)">${s.ok}</div><div class="hk-lbl">acima R$5k ✓</div></div>
    <div class="hk"><div class="hk-val">${s.total}</div><div class="hk-lbl">clientes total</div></div>
    <div class="hk" style="background:rgba(244,63,94,.1)"><div class="hk-val" style="color:var(--red)">${fk(s.dia)}</div><div class="hk-lbl" style="color:rgba(244,63,94,.6)">necessário/dia</div></div>
  `;
  const sg=document.getElementById('sg');sg.innerHTML='';
  Object.entries(SETORES).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([setor,cl])=>{
    const st=stats(cl);const n=num(setor);const p2=st.p;
    const card=document.createElement('div');card.className='sc';
    card.innerHTML=`
      <div class="sc-num">${n}</div>
      <div class="sc-sub">${st.total} clientes · <span style="color:var(--green)">${st.pBat}% batendo meta</span></div>
      <div class="sc-row"><span class="sc-row-lbl">Realizado</span><span style="color:${clr(p2)};font-weight:700">${fk(st.vr)}</span></div>
      <div class="sc-row"><span class="sc-row-lbl">Meta</span><span>${fk(st.vp)}</span></div>
      <div class="sc-row"><span class="sc-row-lbl">Falta</span><span style="color:var(--red)">${fk(st.falta)}</span></div>
      <div class="sc-bar"><div class="sc-bar-fill" style="width:${Math.min(p2,100)}%;background:${clr(p2)}"></div></div>
      <div class="sc-foot"><span style="color:${clr(p2)};font-weight:700">${p2}% da meta</span><span style="color:var(--muted2);font-size:10px">${st.ok}/${st.m5} acima 5k</span></div>
      <div class="sc-metadia"><span class="sc-metadia-lbl">Meta/dia</span><span class="sc-metadia-val">${fk(st.dia)}</span></div>
    `;
    card.onclick=()=>openSetor(setor);sg.appendChild(card);
  });
}

// ── SETOR ─────────────────────────────────────────────────
function openSetor(setor){
  curSetor=setor;curFilter='all';curSort='real_desc';curSort2='falta_desc';curTab='all';
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('on',b.dataset.f==='all'));
  document.querySelectorAll('[data-s]').forEach(b=>b.classList.toggle('on',b.dataset.s==='real_desc'));
  document.querySelectorAll('[data-s2]').forEach(b=>b.classList.toggle('on',b.dataset.s2==='falta_desc'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='all'));
  document.getElementById('tabAll').style.display='';
  document.getElementById('tabSem').style.display='none';
  document.getElementById('srch').value='';
  document.getElementById('srch2').value='';
  const cl=SETORES[setor];const st=stats(cl);const n=num(setor);const p=st.p;
  const m5cfg=META5K[n]||{meta:50};
  const ok5k_pct=st.m5>0?Math.round((st.ok/st.m5)*100):0;
  document.getElementById('stT').textContent='Setor '+n;
  document.getElementById('stS').textContent=`${st.total} clientes · ${p}% da meta · ${DIAS_REST} dias restantes`;
  document.getElementById('stK').innerHTML=`
    <div class="kpi kpi-hl">
      <div class="kpi-val">${fk(st.dia)}</div>
      <div class="kpi-lbl">META DO DIA<br><span style="font-size:9px;color:var(--muted)">${DIAS_REST} dias restantes</span></div>
    </div>
    <div class="kpi"><div class="kpi-val" style="color:${clr(p)}">${p}%</div><div class="kpi-lbl">da meta</div></div>
    <div class="kpi"><div class="kpi-val">${f0(st.vr)}</div><div class="kpi-lbl">realizado</div></div>
    <div class="kpi"><div class="kpi-val">${f0(st.vp)}</div><div class="kpi-lbl">meta total</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--red)">${f0(st.falta)}</div><div class="kpi-lbl">falta pra meta</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--green)">${st.pBat}%</div><div class="kpi-lbl">clientes batendo meta</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--yellow)">${st.sub}</div><div class="kpi-lbl">abaixo R$5k</div></div>
    <div class="kpi">
      <div class="kpi-val" style="color:${ok5k_pct>=m5cfg.meta?'var(--green)':'var(--red)'}">
        ${st.ok}<span style="color:var(--muted);font-size:12px;font-weight:400"> / ${st.m5}</span>
      </div>
      <div class="kpi-lbl">acima R$5k ✓<br><span style="color:var(--muted2)">meta: ${m5cfg.meta}%</span></div>
    </div>
  `;
  renderList();renderSemMeta();
  showView('vSt');
}

function switchTab(el){
  curTab=el.dataset.tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b===el));
  document.getElementById('tabAll').style.display=curTab==='all'?'':'none';
  document.getElementById('tabSem').style.display=curTab==='sem'?'':'none';
}
function setFilter(btn){curFilter=btn.dataset.f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderList();}
function setSort(btn){curSort=btn.dataset.s;document.querySelectorAll('[data-s]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderList();}
function setSort2(btn){curSort2=btn.dataset.s2;document.querySelectorAll('[data-s2]').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderSemMeta();}

function sortArr(arr,sk){
  return[...arr].sort((a,b)=>{
    const ra=Math.max(0,a.vb_real),rb=Math.max(0,b.vb_real);
    const ma=Math.max(0,a.vb_proj),mb=Math.max(0,b.vb_proj);
    const pa=pct(ra,ma),pb=pct(rb,mb);
    const fa=Math.max(0,ma-ra),fb=Math.max(0,mb-rb);
    if(sk==='real_desc')return rb-ra;if(sk==='real_asc')return ra-rb;
    if(sk==='pct_desc')return pb-pa;if(sk==='pct_asc')return pa-pb;
    if(sk==='falta_desc')return fb-fa;return 0;
  });
}

function renderClientItems(arr){
  if(!arr.length)return'';
  return arr.map(c=>{
    const real=Math.max(0,c.vb_real),meta=Math.max(0,c.vb_proj);
    const p2=pct(real,meta);
    const dot=real<=0?'var(--red)':real<5000?'var(--yellow)':'var(--green)';
    const cd=encodeURIComponent(JSON.stringify(c));
    return`<div class="ci" onclick="openClient('${cd}')">
      <div class="ci-dot" style="background:${dot}"></div>
      <div class="ci-info"><div class="ci-name">${esc(c.razao)}</div><div class="ci-seg">${esc(c.bandeira)} · ${esc(c.segmento)}</div></div>
      <div class="ci-r"><div class="ci-val" style="color:${clr(p2)}">${fk(real)}</div><div class="ci-meta">meta ${fk(meta)}</div><div class="ci-pct" style="color:${clr(p2)}">${p2}%</div></div>
    </div>`;
  }).join('');
}

function renderList(){
  if(!curSetor)return;
  const s=document.getElementById('srch').value.toLowerCase();
  let arr=SETORES[curSetor];
  if(curFilter==='sem')arr=arr.filter(c=>c.vb_real<=0);
  else if(curFilter==='sub5k')arr=arr.filter(c=>c.vb_real>0&&c.vb_real<5000);
  else if(curFilter==='ok5k')arr=arr.filter(c=>c.acima_5k===1);
  if(s)arr=arr.filter(c=>c.razao.toLowerCase().includes(s)||c.bandeira.toLowerCase().includes(s));
  arr=sortArr(arr,curSort);
  document.getElementById('stCnt').textContent=arr.length+' clientes';
  document.getElementById('cList').innerHTML=renderClientItems(arr)||'<div class="empty">Nenhum cliente encontrado</div>';
}

function renderSemMeta(){
  if(!curSetor)return;
  const s=document.getElementById('srch2').value.toLowerCase();
  let arr=SETORES[curSetor].filter(c=>!(c.vb_proj>0&&c.vb_real>=c.vb_proj));
  if(s)arr=arr.filter(c=>c.razao.toLowerCase().includes(s)||c.bandeira.toLowerCase().includes(s));
  arr=sortArr(arr,curSort2);
  document.getElementById('smCnt').textContent=arr.length+' clientes';
  document.getElementById('smList').innerHTML=renderClientItems(arr)||'<div class="empty" style="color:var(--green)">🎉 Todos bateram a meta!</div>';
}

// ── CLIENT ────────────────────────────────────────────────
function openClient(raw){
  const c=JSON.parse(decodeURIComponent(raw));
  const real=Math.max(0,c.vb_real),meta=Math.max(0,c.vb_proj);
  const falta=Math.max(0,meta-real),p=pct(real,meta),cor=clr(p);
  const dia=DIAS_REST>0?falta/DIAS_REST:0;
  const n=num(c.setor);
  document.getElementById('cdN').textContent=c.razao;
  document.getElementById('cdS').textContent='Setor '+n+' · '+MES;
  document.getElementById('cdT').innerHTML=`<span class="tag">${esc(c.bandeira)}</span><span class="tag">${esc(c.segmento)}</span><span class="tag">Cód. ${esc(c.cod)}</span>`;
  const sc=real<=0?'s-bad':p>=100?'s-ok':'s-warn';
  const st=real<=0?'⚠ Nenhuma compra no mês':p>=100?'✓ Meta atingida':'▲ Em andamento — '+Math.round(100-p)+'% restante';
  document.getElementById('progCard').innerHTML=`
    <div class="prog-card">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px">Progresso na Meta · ${MES}</div>
      <div class="prog-top">
        <div class="prog-pct" style="color:${cor}">${p}%</div>
        <div class="prog-right"><div class="prog-real" style="color:${cor}">${f0(real)}</div><div class="prog-lbl">de ${f0(meta)}</div><div class="prog-lbl" style="color:var(--red);margin-top:4px">falta ${f0(falta)}</div></div>
      </div>
      <div class="prog-bar"><div class="prog-bar-fill" style="width:${Math.min(p,100)}%;background:${cor}"></div></div>
      <span class="sp ${sc}">${st}</span>
    </div>`;
  const ok5k=c.acima_5k===1,falta5k=Math.max(0,5000-real),pct5k=Math.min(Math.round((real/5000)*100),100);
  document.getElementById('m5kCard').innerHTML=`
    <div class="m5k-card ${ok5k?'m5k-ok':'m5k-warn'}">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:${ok5k?'var(--green)':'var(--yellow)'};margin-bottom:8px">Meta R$5.000</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <div style="font-size:22px;font-weight:900;color:${ok5k?'var(--green)':'var(--yellow)'}">${ok5k?'✓ Atingida':fk(real)}</div>
          <div style="font-size:12px;color:var(--muted2);margin-top:3px">${ok5k?'Cliente acima de R$5k':'Faltam '+f0(falta5k)+' para R$5k'}</div>
        </div>
        <div style="font-size:22px;font-weight:900;color:${ok5k?'var(--green)':'var(--yellow)'}">${pct5k}%</div>
      </div>
      <div style="height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:10px">
        <div style="height:100%;width:${pct5k}%;background:${ok5k?'var(--green)':'var(--yellow)'};border-radius:3px"></div>
      </div>
    </div>`;
  document.getElementById('infoCard').innerHTML=`
    <div class="ir"><span class="ir-l">Meta do cliente</span><span class="ir-r">${f0(meta)}</span></div>
    <div class="ir"><span class="ir-l">Realizado</span><span class="ir-r" style="color:${cor}">${f0(real)}</span></div>
    <div class="ir"><span class="ir-l">Falta pra meta</span><span class="ir-r" style="color:var(--red)">${f0(falta)}</span></div>
    <div class="ir"><span class="ir-l">Meta/dia necessária</span><span class="ir-r" style="color:var(--red);font-weight:800">${fk(dia)}<span style="color:var(--muted);font-size:11px;font-weight:400"> (${DIAS_REST} dias)</span></span></div>
    <div class="ir"><span class="ir-l">Potencial</span><span class="ir-r">${f0(c.potencial)}</span></div>
    <div class="ir"><span class="ir-l">Bandeira</span><span class="ir-r">${esc(c.bandeira)}</span></div>
    <div class="ir"><span class="ir-l">Segmento</span><span class="ir-r">${esc(c.segmento)}</span></div>
    <div class="ir"><span class="ir-l">Código SAP</span><span class="ir-r" style="color:var(--muted2)">${esc(c.cod)}</span></div>
  `;
  showView('vCl');
}

// Init
renderOverview();
</script>
</body>
</html>
