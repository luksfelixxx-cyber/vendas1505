    if(!DB.retiradas) DB.retiradas = [];
    if(!DB.aberturas) DB.aberturas = {};
    if(!DB.comissao) DB.comissao = {baixo:1, alto:2};
    if(!DB.metaTicketMedio) DB.metaTicketMedio = 0;

    const idsExistentes = new Set(DB.vendas.map(v => v.id));
    log(`Vendas já existentes no app: ${DB.vendas.length}`, '');

    let adicionadas = 0;
    let ignoradas = 0;
    for(const v of NOVAS_VENDAS) {
      if(idsExistentes.has(v.id)) { ignoradas++; continue; }
      DB.vendas.push(v);
      adicionadas++;
    }

    // Garantir que Ana Luiza e Sabrina estejam cadastradas
    const nomesExistentes = new Set(DB.vendedoras.map(v => v.nome));
    if(!nomesExistentes.has('Sabrina')) {
      DB.vendedoras.push({id:'vd_sabrina', nome:'Sabrina', meta:0});
      log('Vendedora Sabrina cadastrada.', 'ok');
    }
    if(!nomesExistentes.has('Ana Luiza')) {
      DB.vendedoras.push({id:'vd_analuiza', nome:'Ana Luiza', meta:0});
      log('Vendedora Ana Luiza cadastrada.', 'ok');
    }

    log(`Salvando ${adicionadas} vendas novas...`, '');
    await dbRef.set(DB);
    log(`✅ Pronto! ${adicionadas} vendas importadas. ${ignoradas} já existiam.`, 'ok bold');
    log('Você já pode fechar esta página e abrir o app.', 'ok');
  } catch(e) {
    log('❌ Erro: ' + e.message, 'err');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
